# Production stack. Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Put HTTPS in front (Caddy / nginx / Cloudflare) pointing to :80 on this host,
# or expose FRONTEND on 80/443 via your reverse proxy.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextgen_task}
      POSTGRES_USER: ${POSTGRES_USER:-nextgen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --worker-class gthread --workers 2 --threads 8 --timeout 120"
    volumes:
      - media_data:/app/media
    env_file:
      - .env.production
    environment:
      CELERY_TASK_ALWAYS_EAGER: "0"
      DATABASE_URL: postgres://${POSTGRES_USER:-nextgen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nextgen_task}
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency 2
    volumes:
      - media_data:/app/media
    env_file:
      - .env.production
    environment:
      CELERY_TASK_ALWAYS_EAGER: "0"
      DATABASE_URL: postgres://${POSTGRES_USER:-nextgen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nextgen_task}
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - media_data:/var/www/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
