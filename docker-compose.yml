services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nextgen_task
      POSTGRES_USER: nextgen
      POSTGRES_PASSWORD: nextgen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextgen -d nextgen_task"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CELERY_TASK_ALWAYS_EAGER: "0"
      DATABASE_URL: postgres://nextgen:nextgen@postgres:5432/nextgen_task
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      CELERY_TASK_ALWAYS_EAGER: "0"
      DATABASE_URL: postgres://nextgen:nextgen@postgres:5432/nextgen_task
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
