server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 32m;

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Django API
    location /api/ {
        # Prefer outer TLS proxy header; default https (this stack is always behind HTTPS).
        set $fwd_proto $http_x_forwarded_proto;
        if ($fwd_proto = "") { set $fwd_proto "https"; }
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_read_timeout 120s;
    }

    # SSE live stream — no buffering, long-lived connection
    location /api/stream/ {
        set $fwd_proto $http_x_forwarded_proto;
        if ($fwd_proto = "") { set $fwd_proto "https"; }
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    # Django admin / static via app (whitenoise) — rare; keep for admin
    location /admin/ {
        set $fwd_proto $http_x_forwarded_proto;
        if ($fwd_proto = "") { set $fwd_proto "https"; }
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }

    location /static/ {
        proxy_pass http://web:8000;
    }

    # Uploaded files are NEVER served publicly. They are delivered only through
    # the authenticated Django endpoint (/api/attachments/<id>/download/), which
    # validates a signed, expiring token and then hands the bytes to nginx via
    # X-Accel-Redirect into this internal-only location.
    location /_protected_media/ {
        internal;
        alias /var/www/media/;
    }

    # Explicitly refuse any direct hit on the raw media path (defense in depth).
    location /media/ {
        return 404;
    }
}
